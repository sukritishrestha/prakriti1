<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I'm Sorry ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.2);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 500px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .heart {
      font-size: 3rem;
      margin: 20px 0;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    button {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background: #ff4d6d;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #e63956;
    }

    .message {
      margin-top: 20px;
      font-size: 1.3rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>I'm Sorry ❤️</h1>
    <div class="heart">💔</div>

    <p>
      I know I made a mistake.<br><br>
      You mean so much to me, and I hate hurting you.<br><br>
      I just want to say… I love you ❤️
    </p>

    <button onclick="showMessage()">Click if you forgive me</button>

    <div class="message" id="msg">
      Thank you for giving me another chance 💖
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").style.display = "block";
    }
  </script>

</body>
</html>
